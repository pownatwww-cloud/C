<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline';">
  <title>Calc 40%</title>

  <!-- PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Calc40">
  <meta name="theme-color" id="themeColor" content="#0f0f13">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ── Variables ── */
    :root {
      --bg:      #0f0f13;
      --surface: #1a1a24;
      --surface2:#12121a;
      --accent:  #f5c518;
      --accent2: #ff6b35;
      --text:    #ffffff;
      --muted:   #7a7a8c;
      --border:  #2a2a3a;
      --danger:  #ff4f4f;
      --success: #4fcf8a;
      --shadow:  rgba(245,197,24,0.18);
    }
    body.light {
      --bg:      #f0f0f5;
      --surface: #ffffff;
      --surface2:#e8e8f0;
      --accent:  #d4a800;
      --accent2: #e05a20;
      --text:    #111111;
      --muted:   #666677;
      --border:  #d0d0e0;
      --danger:  #cc2222;
      --success: #1a9a5a;
      --shadow:  rgba(212,168,0,0.15);
    }

    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    body {
      font-family: 'Kanit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top, 16px) 16px env(safe-area-inset-bottom, 16px);
      transition: background 0.3s, color 0.3s;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Splash ── */
    #splash {
      position: fixed;
      inset: 0;
      background: #0f0f13;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 9999;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    #splash.hide { opacity: 0; transform: scale(1.06); pointer-events: none; }
    .splash-pct {
      font-size: 72px;
      font-weight: 800;
      color: #f5c518;
      line-height: 1;
      letter-spacing: -2px;
    }
    .splash-label {
      font-size: 15px;
      color: #666;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ── Layout ── */
    .app { width: 100%; max-width: 420px; }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .logo {
      display: flex;
      flex-direction: column;
    }
    .logo-pct { font-size: 38px; font-weight: 800; color: var(--accent); line-height: 1; letter-spacing: -1px; }
    .logo-sub { font-size: 12px; color: var(--muted); letter-spacing: 1.5px; }

    .theme-btn {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.3s;
    }
    .theme-btn:active { transform: scale(0.93); }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 24px;
      margin-bottom: 14px;
      transition: background 0.3s, border-color 0.3s;
    }

    /* ── Input ── */
    .field-label {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .input-wrap {
      display: flex;
      align-items: center;
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .input-wrap:focus-within { border-color: var(--accent); }
    .input-wrap.error-ring  { border-color: var(--danger); }

    .sym {
      padding: 0 14px;
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      user-select: none;
      flex-shrink: 0;
    }

    #amount {
      flex: 1;
      min-width: 0;
      border: none;
      outline: none;
      background: transparent;
      font-family: 'Kanit', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      padding: 15px 14px 15px 0;
      -moz-appearance: textfield;
    }
    #amount::-webkit-inner-spin-button,
    #amount::-webkit-outer-spin-button { -webkit-appearance: none; }

    .clear-x {
      padding: 0 14px;
      font-size: 18px;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
      transition: color 0.2s;
    }
    .clear-x:hover { color: var(--danger); }

    .err-msg {
      font-size: 12px;
      color: var(--danger);
      margin-top: 8px;
      min-height: 16px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .err-msg.show { opacity: 1; }

    /* ── Calc Button ── */
    .calc-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 16px;
      font-family: 'Kanit', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: #000;
      cursor: pointer;
      letter-spacing: 0.3px;
      box-shadow: 0 6px 24px var(--shadow);
      transition: transform 0.12s, box-shadow 0.2s;
    }
    .calc-btn:active { transform: scale(0.97); box-shadow: 0 2px 10px var(--shadow); }

    /* ── Result ── */
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 24px;
      margin-bottom: 14px;
      display: none;
      transition: background 0.3s;
    }
    .result-card.show {
      display: block;
      animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.88) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .res-label { font-size: 11px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
    .res-big   { font-size: 46px; font-weight: 800; color: var(--accent); line-height: 1; word-break: break-all; letter-spacing: -1px; }
    .res-unit  { font-size: 14px; color: var(--muted); margin-top: 2px; }

    .divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }

    .breakdown { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .bk {
      background: var(--surface2);
      border-radius: 14px;
      padding: 14px;
      transition: background 0.3s;
    }
    .bk-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .bk-val   { font-size: 17px; font-weight: 700; color: var(--text); word-break: break-all; }

    /* ── Reset Button ── */
    .reset-btn {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      font-family: 'Kanit', sans-serif;
      font-size: 14px;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .reset-btn:hover  { border-color: var(--muted); color: var(--text); }
    .reset-btn:active { transform: scale(0.97); }

    /* ── History ── */
    .history-section { margin-top: 14px; }
    .history-title {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 10px;
      padding: 0 4px;
    }
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      animation: slideIn 0.25s ease both;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-8px); } }
    .history-item .hi-input { color: var(--muted); }
    .history-item .hi-result { color: var(--accent); font-weight: 700; }
  </style>
</head>

<body>

<!-- Splash Screen -->
<div id="splash" role="status" aria-label="กำลังโหลด">
  <div class="splash-pct">40%</div>
  <div class="splash-label">Calculator</div>
</div>

<main class="app" role="main">

  <!-- Top Bar -->
  <div class="topbar">
    <div class="logo">
      <span class="logo-pct">40%</span>
      <span class="logo-sub">CALCULATOR</span>
    </div>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" aria-label="เปลี่ยนธีม" title="เปลี่ยนธีม">🌙</button>
  </div>

  <!-- Input Card -->
  <div class="card">
    <div class="field-label">กรอกจำนวนเงิน</div>
    <div class="input-wrap" id="inputWrap">
      <span class="sym">฿</span>
      <input
        type="number"
        id="amount"
        placeholder="0.00"
        inputmode="decimal"
        min="0"
        max="999999999999"
        step="any"
        autocomplete="off"
        aria-label="จำนวนเงิน"
      >
      <span class="clear-x" id="clearX" onclick="clearInput()" role="button" aria-label="ล้าง" tabindex="0">✕</span>
    </div>
    <div class="err-msg" id="errMsg" role="alert" aria-live="polite"></div>
  </div>

  <!-- Calculate Button -->
  <button class="calc-btn" onclick="calc()" aria-label="คำนวณ 40%">
    คำนวณ 40%
  </button>

  <!-- Result -->
  <div class="result-card" id="resultCard" aria-live="polite">
    <div class="res-label">40% ของยอดเงิน</div>
    <div class="res-big" id="resMain">0</div>
    <div class="res-unit">บาท</div>
    <hr class="divider">
    <div class="breakdown">
      <div class="bk">
        <div class="bk-label">ยอดเดิม (100%)</div>
        <div class="bk-val" id="resOrig">-</div>
      </div>
      <div class="bk">
        <div class="bk-label">ส่วนที่เหลือ (60%)</div>
        <div class="bk-val" id="resRest">-</div>
      </div>
    </div>
  </div>

  <!-- Reset -->
  <button class="reset-btn" onclick="resetAll()" aria-label="เริ่มใหม่">ล้างทั้งหมด ✕</button>

  <!-- History -->
  <div class="history-section" id="historySection" style="display:none">
    <div class="history-title">ประวัติการคำนวณ</div>
    <div class="history-list" id="historyList"></div>
  </div>

</main>

<script>
  /* ── Splash ── */
  window.addEventListener('load', () => {
    setTimeout(() => {
      const s = document.getElementById('splash');
      s.classList.add('hide');
      setTimeout(() => s.remove(), 320);
    }, 600);
  });

  /* ── Theme ── */
  function safeLS(op, key, val) {
    try { return op === 'get' ? localStorage.getItem(key) : localStorage.setItem(key, val); }
    catch (_) { return null; }
  }

  function applyTheme(mode) {
    const isLight = mode === 'light';
    document.body.classList.toggle('light', isLight);
    document.getElementById('themeBtn').textContent = isLight ? '☀️' : '🌙';
    document.getElementById('themeColor').content = isLight ? '#f0f0f5' : '#0f0f13';
    const metaTheme = document.querySelector('meta[name="theme-color"]');
    if (metaTheme) metaTheme.content = isLight ? '#f0f0f5' : '#0f0f13';
  }

  function toggleTheme() {
    const isLight = document.body.classList.contains('light');
    const next = isLight ? 'dark' : 'light';
    applyTheme(next);
    safeLS('set', 'calc40_theme', next);
  }

  /* Restore saved theme */
  applyTheme(safeLS('get', 'calc40_theme') || 'dark');

  /* ── Formatting ── */
  function fmt(n) {
    return n.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  /* ── Validation ── */
  function showError(msg) {
    const err = document.getElementById('errMsg');
    const wrap = document.getElementById('inputWrap');
    err.textContent = msg;
    err.classList.add('show');
    wrap.classList.add('error-ring');
  }

  function clearError() {
    const err = document.getElementById('errMsg');
    const wrap = document.getElementById('inputWrap');
    err.textContent = '';
    err.classList.remove('show');
    wrap.classList.remove('error-ring');
  }

  /* ── History (max 5) ── */
  const history = [];

  function addHistory(input, result) {
    history.unshift({ input, result });
    if (history.length > 5) history.pop();
    renderHistory();
  }

  function renderHistory() {
    const sec  = document.getElementById('historySection');
    const list = document.getElementById('historyList');
    if (history.length === 0) { sec.style.display = 'none'; return; }
    sec.style.display = 'block';
    list.innerHTML = '';
    history.forEach(h => {
      const el = document.createElement('div');
      el.className = 'history-item';
      /* Safe: use textContent, never innerHTML with user data */
      const left = document.createElement('span');
      left.className = 'hi-input';
      left.textContent = '฿ ' + fmt(h.input);
      const right = document.createElement('span');
      right.className = 'hi-result';
      right.textContent = '= ฿ ' + fmt(h.result);
      el.appendChild(left);
      el.appendChild(right);
      list.appendChild(el);
    });
  }

  /* ── Calculator ── */
  function calc() {
    clearError();

    const raw = document.getElementById('amount').value.trim();

    /* Security: reject empty, non-numeric, oversized */
    if (raw === '') { showError('⚠ กรุณากรอกจำนวนเงิน'); return; }

    /* Parse strictly */
    const v = parseFloat(raw);

    if (!Number.isFinite(v))       { showError('⚠ ตัวเลขไม่ถูกต้อง'); return; }
    if (v < 0)                     { showError('⚠ ตัวเลขต้องไม่ติดลบ'); return; }
    if (v > 999_999_999_999)       { showError('⚠ จำนวนเกินขีดจำกัด'); return; }

    const forty = v * 0.4;
    const sixty = v * 0.6;

    /* Write results safely via textContent (XSS-safe) */
    document.getElementById('resMain').textContent = fmt(forty);
    document.getElementById('resOrig').textContent = '฿ ' + fmt(v);
    document.getElementById('resRest').textContent = '฿ ' + fmt(sixty);

    /* Show result with animation */
    const card = document.getElementById('resultCard');
    card.classList.remove('show');
    void card.offsetWidth;
    card.classList.add('show');

    addHistory(v, forty);
  }

  /* ── Clear input only ── */
  function clearInput() {
    document.getElementById('amount').value = '';
    clearError();
    document.getElementById('amount').focus();
  }

  /* ── Reset all ── */
  function resetAll() {
    clearInput();
    document.getElementById('resultCard').classList.remove('show');
    history.length = 0;
    renderHistory();
  }

  /* ── Keyboard: Enter to calc ── */
  document.getElementById('amount').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); calc(); }
  });

  /* ── Service Worker (PWA offline) ── */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => { /* fail silently */ });
    });
  }
</script>

</body>
</html>
